repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      # Whitespace / line endings
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: mixed-line-ending
        args: [--fix=lf]
      # File integrity
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: check-symlinks
      # Executables / shebangs
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable
      # Parseable config
      - id: check-yaml
      - id: check-json

  # ruff, ty, and pytest all run via `uv run` so their versions are
  # single-sourced from uv.lock. Same binary CI uses via `task dev:check`.
  # No second `rev:` to keep aligned.
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: uv run --no-sync ruff check --fix
        language: system
        types: [python]
        pass_filenames: false
      - id: ruff-format
        name: ruff format
        entry: uv run --no-sync ruff format
        language: system
        types: [python]
        pass_filenames: false
      - id: ty
        name: ty type check
        entry: uv run --no-sync ty check src
        language: system
        types: [python]
        pass_filenames: false
      # pytest runs the full suite (each test spins up a real git repo),
      # so it's a pre-push gate rather than per-commit. types:[python]
      # means a docs-only push skips it too. CI (task dev:check) is the
      # authoritative gate.
      - id: pytest
        name: pytest
        entry: uv run --no-sync pytest -q
        language: system
        stages: [pre-push]
        types: [python]
        pass_filenames: false
  - repo: https://github.com/alessandrojcm/commitlint-pre-commit-hook
    rev: v9.26.0
    hooks:
      - id: commitlint
        stages: [commit-msg]
        additional_dependencies:
          - "@commitlint/config-conventional@^21.1.0"

  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
      - id: actionlint

  - repo: https://github.com/woodruffw/zizmor-pre-commit
    rev: v1.26.1
    hooks:
      - id: zizmor

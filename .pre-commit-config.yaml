repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: local
    hooks:
      - id: ty
        name: ty type check
        entry: uv run ty check src
        language: system
        types: [python]
        pass_filenames: false
      - id: pytest
        name: pytest
        entry: bash -c 'chflags -R nohidden .venv 2>/dev/null; uv run pytest -q'
        language: system
        pass_filenames: false

version: "3"
silent: true

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list

  dev:lint:
    desc: Run ruff check
    cmds:
      - uv run ruff check src tests

  dev:fmt:
    desc: Apply ruff format
    cmds:
      - uv run ruff format src tests

  dev:fmt-check:
    desc: Check formatting without rewriting
    cmds:
      - uv run ruff format --check src tests

  dev:typecheck:
    desc: Run ty type checker
    cmds:
      - uv run ty check src

  dev:test:
    desc: Run the pytest suite
    cmds:
      - chflags -R nohidden .venv 2>/dev/null || true
      - uv run pytest

  dev:check:
    desc: Full quality gate — lint, format-check, typecheck, tests
    cmds:
      - task: dev:lint
      - task: dev:fmt-check
      - task: dev:typecheck
      - task: dev:test

  dev:hooks:
    desc: Run all prek hooks against every file
    cmds:
      - prek run --all-files
